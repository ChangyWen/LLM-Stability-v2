description: llm-stability

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04:20251218T130926693
  setup:
    - export PATH=$$PATH:/home/aiscuser/.local/bin
    - pip install packaging
    - pip install ninja
    - pip install https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.0.post2/flash_attn-2.8.0.post2+cu12torch2.5cxx11abiFALSE-cp310-cp310-linux_x86_64.whl
    - pip install https://github.com/vllm-project/vllm/releases/download/v0.12.0/vllm-0.12.0-cp38-abi3-manylinux_2_31_x86_64.whl
    - pip install onnxruntime-gpu
    - pip install datasets
    - pip install transformers
    - pip install python-dotenv
    - pip install uuid
    - pip install openai
    - pip install jsonlines
    - pip install tqdm
    - pip install pandas
    - pip install wandb
    - pip install mamba-ssm[causal-conv1d] --no-build-isolation

code:
  local_dir: /home/v-dachengwen/LLM-Stability-v2

target:
  service: sing
  # name: Ranking
  # name: Feeds
  # name: msrresrchvc
  name: msrresrchbasicvc
  workspace_name: CS-NewsAndFeeds-Singularity

storage:
  external:
    storage_account_name: csnewsandfeeds4150361735
    container_name: unium
    mount_dir: /mnt/blob_output

